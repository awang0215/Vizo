name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: cmd
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version

          if ($packageVersion -ne $version) {
            throw "Tag version ($tag) does not match package.json version ($packageVersion)."
          }

          $notesPath = "docs/releases/$tag.md"
          $hasNotes = Test-Path $notesPath

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "has_notes=$($hasNotes.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Enable Windows Developer Mode
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowAllTrustedApps" /d "1"

      - name: Build Windows installer
        shell: pwsh
        run: |
          cmd /c "npm run build:win" *>&1 | Tee-Object -FilePath build-win.log
          exit $LASTEXITCODE

      - name: Print build failure details
        if: failure()
        shell: pwsh
        run: |
          if (-not (Test-Path build-win.log)) {
            Write-Output "::error::build-win.log was not generated."
            exit 0
          }

          $patterns = Select-String -Path build-win.log -Pattern 'ENOENT|makensis|winCodeSign|failedTask|stackTrace|Error:|cannot move downloaded|Process completed with exit code|code=-4058|spawn '

          if ($patterns) {
            $patterns | Select-Object -Last 30 | ForEach-Object {
              $line = $_.Line.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Output "::error::$line"
            }
            exit 0
          }

          Get-Content build-win.log -Tail 40 | ForEach-Object {
            $line = $_.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::warning::$line"
          }

      - name: Publish release with custom notes
        if: steps.meta.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Vizo ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.meta.outputs.notes_path }}
          files: |
            release/*-Setup.exe
            release/*-Setup.exe.blockmap
            release/latest.yml

      - name: Publish release with generated notes
        if: steps.meta.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Vizo ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*-Setup.exe
            release/*-Setup.exe.blockmap
            release/latest.yml
